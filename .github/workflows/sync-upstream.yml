name: Sync Upstream & Rebuild

on:
  schedule:
    # Check for upstream updates daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/respectlytics/respectaso.git || true

      - name: Fetch upstream
        run: git fetch upstream --tags

      - name: Check for new upstream commits
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "up_to_date=true" >> $GITHUB_OUTPUT
            echo "No new upstream commits."
          else
            echo "up_to_date=false" >> $GITHUB_OUTPUT
            echo "New upstream commits found!"
          fi

      - name: Merge upstream changes
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git merge upstream/main --no-edit --strategy-option theirs || {
            echo "Merge conflict — accepting upstream version"
            git checkout --theirs .
            git add .
            git commit --no-edit
          }

      - name: Push synced changes
        if: steps.check.outputs.up_to_date == 'false'
        run: git push origin main

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.up_to_date }}" = "true" ]; then
            echo "### ✅ Already up to date" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 🔄 Synced with upstream and pushed" >> $GITHUB_STEP_SUMMARY
            echo "Build workflow will be triggered automatically." >> $GITHUB_STEP_SUMMARY
          fi
